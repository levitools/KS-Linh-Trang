<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quản Lý Khách Sạn</title>
<style>
body{font-family:Arial,sans-serif;margin:0;padding:20px;background:#f4f4f4}
h1{text-align:center}
.container{max-width:1200px;margin:auto}
.controls{text-align:center;margin:15px 0}
button{padding:10px 15px;margin:5px;border:none;border-radius:5px;cursor:pointer}
.btn-primary{background:#007bff;color:#fff}
.btn-success{background:#28a745;color:#fff}
.btn-warning{background:#ffc107}
.floor{background:#fff;border:2px solid #333;border-radius:10px;padding:15px;margin-bottom:15px}
.rooms{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-top:10px}
.room{padding:12px;border-radius:10px;text-align:center;cursor:pointer;border:3px solid #666}
.clean{background:#d4edda;border-color:#28a745}
.dirty{background:#f8d7da;border-color:#dc3545}
.room-number{font-size:20px;font-weight:bold}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7)}
.modal-content {
    background: white;
    margin: 20px auto;
    padding: 25px;
    width: 90%;
    max-width: 700px;
    border-radius: 12px;

    max-height: 85vh;
    overflow-y: auto;
}
 .modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.7);
    overflow-y:auto;
}
input{width:100%;padding:8px;margin:5px 0}
</style>
</head>
<body>
<div class="container">
<h1>📊 Quản Lý Khách Sạn</h1>
<div class="controls">
<button class="btn-primary" onclick="showManageModal()">Quản Lý Phòng</button>
<button class="btn-success" onclick="exportData()">Xuất CSV</button>
<button class="btn-warning" onclick="clearData()">Xóa Dữ Liệu</button>
</div>
<div id="floorPlan"></div>
</div>

<div id="roomModal" class="modal">
<div class="modal-content">
<h2 id="modalTitle"></h2>
<p>Số phòng: <span id="roomNum"></span></p>
<p>Loại phòng: <span id="roomType"></span></p>
<input type="number" id="guestCount" placeholder="Số khách">
<input type="text" id="guestName" placeholder="Tên khách">
<p>
<button onclick="setStatus('clean')">Sạch</button>
<button onclick="setStatus('dirty')">Bẩn</button>
</p>
<button onclick="saveRoomData()">Lưu</button>
<button onclick="closeModal()">Đóng</button>
</div>
</div>

<div id="manageModal" class="modal">
<div class="modal-content">
<h2>Danh sách phòng</h2>
<div id="roomList"></div>
<button onclick="addNewRoom()">+ Thêm phòng</button>
<button onclick="closeManageModal()">Đóng</button>
</div>
</div>

<script>
let rooms=[];

try{
 const saved=localStorage.getItem("hotelRooms");
 rooms=saved?JSON.parse(saved):[
  {id:101,number:101,type:"Standard",floor:1,status:"clean",guests:0,guestName:""},
  {id:102,number:102,type:"Deluxe",floor:1,status:"clean",guests:0,guestName:""},
  {id:201,number:201,type:"VIP",floor:2,status:"clean",guests:0,guestName:""}
 ];
}catch(e){
 rooms=[];
}

function saveData(){
 localStorage.setItem("hotelRooms",JSON.stringify(rooms));
}

function renderFloorPlan() {
    const container = document.getElementById('floorPlan');
    container.innerHTML = '';

    const roomsDiv = document.createElement('div');
    roomsDiv.className = 'rooms';

    rooms.sort((a,b)=>a.number-b.number);

    rooms.forEach(room => {
        const roomDiv = document.createElement('div');

        roomDiv.className = `room ${room.status}`;

        roomDiv.innerHTML = `
            <div class="room-number">${room.number}</div>
            <div class="room-type">${room.type}</div>
            <div class="room-guest">
                ${room.guests > 0 ? room.guests + ' khách' : 'Trống'}
            </div>
        `;

        roomDiv.onclick = () => showRoomModal(room);

        roomsDiv.appendChild(roomDiv);
    });

    container.appendChild(roomsDiv);
}

   container.appendChild(div);
 });
}

let currentRoom=null;

function showRoomModal(room){
 currentRoom=room;
 roomNum.textContent=room.number;
 roomType.textContent=room.type;
 modalTitle.textContent="Phòng "+room.number;
 guestCount.value=room.guests;
 guestName.value=room.guestName||"";
 roomModal.style.display="block";
}

function setStatus(status){
 if(currentRoom) currentRoom.status=status;
}

function saveRoomData(){
 if(!currentRoom) return;
 currentRoom.guests=parseInt(guestCount.value)||0;
 currentRoom.guestName=guestName.value.trim();
 saveData();
 renderFloorPlan();
 closeModal();
}

function closeModal(){ roomModal.style.display="none"; }

function showManageModal(){
 renderRoomList();
 manageModal.style.display="block";
}

function closeManageModal(){
 manageModal.style.display="none";
 renderFloorPlan();
}

function renderRoomList(){
 roomList.innerHTML=rooms.map((r,i)=>`
 <div style="padding:10px;border:1px solid #ddd;margin:5px 0">
 <b>${r.number}</b> - ${r.type}
 <button onclick="editRoom(${i})">Sửa</button>
 <button onclick="deleteRoom(${i})">Xóa</button>
 </div>`).join("");
}

function editRoom(i){
 const r=rooms[i];
 const num=prompt("Số phòng",r.number);
 const type=prompt("Loại phòng",r.type);
 if(num) r.number=parseInt(num);
 if(type) r.type=type;
 saveData();
 renderRoomList();
}

function deleteRoom(i){
 if(confirm("Xóa phòng?")){
  rooms.splice(i,1);
  saveData();
  renderRoomList();
 }
}

function addNewRoom(){
 const num=prompt("Nhập số phòng");
 if(!num) return;

 if(rooms.some(r=>r.number===parseInt(num))){
   alert("Phòng đã tồn tại!");
   return;
 }

 const type=prompt("Loại phòng","Standard")||"Standard";

 rooms.push({
  id:Date.now(),
  number:parseInt(num),
  type:type,
  floor:Math.floor(parseInt(num)/100),
  status:"clean",
  guests:0,
  guestName:""
 });

 saveData();
 renderRoomList();
}

function exportData(){
 let csv="SoPhong,LoaiPhong,SoKhach,TenKhach,TrangThai\n";
 rooms.forEach(r=>{
  csv+=`${r.number},${r.type},${r.guests},"${r.guestName}",${r.status}\n`;
 });
 const blob=new Blob([csv],{type:"text/csv"});
 const a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="khachsan.csv";
 a.click();
}

function clearData(){
 if(confirm("Xóa toàn bộ dữ liệu?")){
   localStorage.removeItem("hotelRooms");
   location.reload();
 }
}

renderFloorPlan();
</script>
</body>
</html>
