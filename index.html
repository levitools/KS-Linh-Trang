<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Quản Lý Khách Sạn</title>
<style>
    button.selected{
    box-shadow:0 0 0 4px #000 inset;
    transform:scale(1.05);
}
    .status-btn{
    opacity:0.7;
    transition:0.2s;
}

.status-btn.active{
    outline:4px solid #000;
    opacity:1;
    transform:scale(1.05);
}
    button{
    padding:10px 15px;
    margin:5px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    color:white;
    font-weight:bold;
}

.btn-checkin{
    background:#0d6efd; /* Xanh dương */
}

.btn-checkout{
    background:#dc3545; /* Đỏ */
}

.btn-cleaning{
    background:#ffc107; /* Vàng */
    color:black;
}

.btn-clean{
    background:#28a745; /* Xanh lá */
}

.btn-save{
    background:#198754;
}

.btn-close{
    background:#6c757d;
}
.btn-reset{
    background:#343a40;
}
body{font-family:Arial;margin:0;padding:20px;background:#f4f4f4}
h1{text-align:center}
.controls{text-align:center;margin:20px 0}
button{padding:10px 15px;margin:5px;border:none;border-radius:6px;cursor:pointer}
.rooms{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:15px}
.room{padding:15px;border-radius:12px;text-align:center;border:4px solid}
.clean{background:#d4edda;border-color:#28a745}
.occupied{background:#cfe2ff;border-color:#0d6efd}
.cleaning{background:#fff3cd;border-color:#ffc107}
.dirty{background:#f8d7da;border-color:#dc3545}
.room-number{font-size:22px;font-weight:bold}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6)}
.modal-content{background:#fff;max-width:500px;margin:5% auto;padding:20px;border-radius:10px}
input{width:100%;padding:8px;margin:5px 0;box-sizing:border-box}
</style>
</head>
<body>
<h1>📊 Quản Lý Khách Sạn</h1>

<div class="controls">
<button class="btn-reset" onclick="resetData()">🗑 Reset</button>
</div>

<div id="rooms" class="rooms"></div>

<div id="modal" class="modal">
<div class="modal-content">
<h2 id="title"></h2>
<label>Tên khách</label>
<input id="guestName">
<label>Số khách</label>
<input id="guestCount" type="number">

<div>
<button class="btn-checkin status-action"
onclick="selectButton(this);checkIn();">
🔵 Check-in
</button>

<button class="btn-checkout status-action"
onclick="selectButton(this);checkOut();">
🔴 Check-out
</button>

<button class="btn-cleaning status-action"
onclick="selectButton(this);setStatus('cleaning');">
🟡 Đang dọn
</button>

<button class="btn-clean status-action"
onclick="selectButton(this);setStatus('clean');">
🟢 Đã sạch
</button>

<br><br>

<button class="btn-save" onclick="saveRoom()">💾 Lưu</button>
<button class="btn-close" onclick="closeModal()">✖ Đóng</button>
</div>

<script>
const defaultRooms=[{number:302,type:"Đơn",status:"clean",guests:0,guestName:""},{number:403,type:"Đơn",status:"clean",guests:0,guestName:""},{number:404,type:"Đơn",status:"clean",guests:0,guestName:""},{number:405,type:"Đơn",status:"clean",guests:0,guestName:""},{number:406,type:"Đơn",status:"clean",guests:0,guestName:""},{number:507,type:"Đơn",status:"clean",guests:0,guestName:""},{number:508,type:"Đơn",status:"clean",guests:0,guestName:""},{number:509,type:"Đơn",status:"clean",guests:0,guestName:""},{number:510,type:"Đơn",status:"clean",guests:0,guestName:""},{number:611,type:"Đơn",status:"clean",guests:0,guestName:""},{number:612,type:"Đơn",status:"clean",guests:0,guestName:""},{number:613,type:"Đơn",status:"clean",guests:0,guestName:""},{number:715,type:"Đơn",status:"clean",guests:0,guestName:""},{number:716,type:"Đơn",status:"clean",guests:0,guestName:""},{number:717,type:"Đơn",status:"clean",guests:0,guestName:""},{number:718,type:"Đơn",status:"clean",guests:0,guestName:""}];
let rooms=JSON.parse(localStorage.getItem('hotelRooms')||'null')||defaultRooms;

function save(){localStorage.setItem('hotelRooms',JSON.stringify(rooms));}
function setStatus(status){

    if(!current) return;

    current.status = status;

    document.querySelectorAll('.status-btn')
        .forEach(btn => btn.classList.remove('active'));

    event.target.classList.add('active');
}
function render(){
const el=document.getElementById('rooms');
el.innerHTML='';
rooms.forEach(r=>{
const d=document.createElement('div');
d.className='room '+r.status;
d.innerHTML=`<div class="room-number">${r.number}</div>
<div>${r.type}</div>
<div>${r.guestName||'Trống'}</div>
<div>${r.guests? r.guests+' khách':''}</div>`;
d.onclick=()=>openRoom(r);
el.appendChild(d);
});
}

let current=null;
function selectButton(btn){

    document.querySelectorAll('.status-action')
        .forEach(b=>b.classList.remove('selected'));

    btn.classList.add('selected');
}

function openRoom(r){
current=r;
title.textContent='Phòng '+r.number;
guestName.value=r.guestName||'';
guestCount.value=r.guests||0;
modal.style.display='block';
document.querySelectorAll('.status-action')
.forEach(b=>b.classList.remove('selected'));

if(room.status==='occupied')
 document.querySelector('.btn-checkin').classList.add('selected');

if(room.status==='dirty')
 document.querySelector('.btn-checkout').classList.add('selected');

if(room.status==='cleaning')
 document.querySelector('.btn-cleaning').classList.add('selected');

if(room.status==='clean')
 document.querySelector('.btn-clean').classList.add('selected');
}

function closeModal(){modal.style.display='none';}

function checkIn(){if(current) current.status='occupied';}
function checkOut(){if(current){current.guestName='';current.guests=0;current.status='dirty';guestName.value='';guestCount.value=0;}}
function setStatus(s){if(current) current.status=s;}

function saveRoom(){
current.guestName=guestName.value.trim();
current.guests=parseInt(guestCount.value)||0;
save();
render();
closeModal();
}

function resetData(){
if(confirm('Xóa dữ liệu?')){
localStorage.removeItem('hotelRooms');
location.reload();
}
}

render();
</script>
</body>
</html>
