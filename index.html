<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Khách Sạn - Sơ Đồ Phòng</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f4f4f4; }
        h1 { text-align: center; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; }
        .controls { margin: 15px 0; text-align: center; }
        button { padding: 8px 15px; margin: 5px; border: none; border-radius: 5px; cursor: pointer; }
        .btn-primary { background: #007bff; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-warning { background: #ffc107; color: black; }

        .floor-plan { display: grid; gap: 10px; margin-top: 20px; }
        .floor { border: 2px solid #333; padding: 10px; background: white; border-radius: 8px; }
        .floor-title { font-weight: bold; margin-bottom: 10px; text-align: center; }
        .rooms { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; }
        
        .room { 
            border: 2px solid #666; padding: 10px; border-radius: 8px; 
            text-align: center; cursor: pointer; min-height: 100px;
            position: relative;
        }
        .room.clean { background: #d4edda; border-color: #28a745; }
        .room.dirty { background: #f8d7da; border-color: #dc3545; }
        .room.empty { background: #e2e3e5; border-color: #6c757d; }

        .room-number { font-weight: bold; font-size: 18px; }
        .room-type { font-size: 12px; color: #555; }
        .room-guest { font-size: 13px; margin-top: 5px; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; }
        .modal-content { background: white; margin: 5% auto; padding: 20px; width: 90%; max-width: 500px; border-radius: 10px; }
        
        .status { padding: 5px 10px; border-radius: 5px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Quản Lý Khách Sạn - Sơ Đồ Phòng</h1>
        <div class="controls">
            <button class="btn-primary" onclick="showManageRooms()">Quản Lý Phòng</button>
            <button class="btn-success" onclick="exportData()">Xuất CSV</button>
            <button class="btn-warning" onclick="clearData()">Xóa Dữ Liệu</button>
        </div>

        <div id="floorPlan" class="floor-plan"></div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Chi Tiết Phòng</h2>
            <p><strong>Phòng:</strong> <span id="roomNum"></span></p>
            <p><strong>Loại:</strong> <span id="roomType"></span></p>
            
            <label>Số lượng khách:</label>
            <input type="number" id="guestCount" value="0" style="width:100%; padding:8px; margin:5px 0;">
            
            <label>Tên khách chính:</label>
            <input type="text" id="guestName" placeholder="Tên khách" style="width:100%; padding:8px; margin:5px 0;">
            
            <label>Trạng thái:</label><br>
            <button onclick="setStatus('clean')" style="background:#28a745;color:white;">Sạch</button>
            <button onclick="setStatus('dirty')" style="background:#dc3545;color:white;">Bẩn</button>
            
            <div style="margin-top:15px;">
                <button class="btn-primary" onclick="saveRoomData()">Lưu</button>
                <button onclick="closeModal()" style="background:#6c757d;color:white;">Đóng</button>
            </div>
        </div>
    </div>

    <script>
        let rooms = JSON.parse(localStorage.getItem('hotelRooms')) || [
            {id:101, number:101, type:"Standard", floor:1, status:"clean", guests:0, guestName:""},
            {id:102, number:102, type:"Deluxe", floor:1, status:"clean", guests:0, guestName:""},
            {id:201, number:201, type:"VIP", floor:2, status:"clean", guests:0, guestName:""},
        ];

        function renderFloorPlan() {
            const container = document.getElementById('floorPlan');
            container.innerHTML = '';
            
            const floors = {};
            rooms.forEach(room => {
                if (!floors[room.floor]) floors[room.floor] = [];
                floors[room.floor].push(room);
            });

            Object.keys(floors).sort((a,b)=>a-b).forEach(floor => {
                const floorDiv = document.createElement('div');
                floorDiv.className = 'floor';
                floorDiv.innerHTML = `<div class="floor-title">TẦNG ${floor}</div>`;
                
                const roomsDiv = document.createElement('div');
                roomsDiv.className = 'rooms';
                
                floors[floor].sort((a,b)=>a.number-b.number).forEach(room => {
                    const roomDiv = document.createElement('div');
                    roomDiv.className = `room ${room.status}`;
                    roomDiv.innerHTML = `
                        <div class="room-number">${room.number}</div>
                        <div class="room-type">${room.type}</div>
                        <div class="room-guest">${room.guests > 0 ? room.guests + ' khách' : 'Trống'}</div>
                    `;
                    roomDiv.onclick = () => showRoomModal(room);
                    roomsDiv.appendChild(roomDiv);
                });
                floorDiv.appendChild(roomsDiv);
                container.appendChild(floorDiv);
            });
        }

        let currentRoom = null;
        function showRoomModal(room) {
            currentRoom = room;
            document.getElementById('modalTitle').textContent = `Phòng ${room.number}`;
            document.getElementById('roomNum').textContent = room.number;
            document.getElementById('roomType').textContent = room.type;
            document.getElementById('guestCount').value = room.guests;
            document.getElementById('guestName').value = room.guestName || '';
            document.getElementById('modal').style.display = 'block';
        }

        function setStatus(status) {
            if (currentRoom) currentRoom.status = status;
        }

        function saveRoomData() {
            if (!currentRoom) return;
            currentRoom.guests = parseInt(document.getElementById('guestCount').value) || 0;
            currentRoom.guestName = document.getElementById('guestName').value.trim();
            localStorage.setItem('hotelRooms', JSON.stringify(rooms));
            closeModal();
            renderFloorPlan();
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function showManageRooms() {
            let html = `<h2>Quản Lý Phòng</h2>`;
            rooms.forEach((room, index) => {
                html += `
                    <div style="margin:10px 0; padding:10px; background:white; border-radius:5px;">
                        Phòng <b>${room.number}</b> - ${room.type} 
                        <button onclick="editRoom(${index})">Sửa</button>
                        <button onclick="deleteRoom(${index})" style="color:red;">Xóa</button>
                    </div>`;
            });
            html += `<br><button onclick="addNewRoom()">+ Thêm Phòng Mới</button>`;
            const win = window.open('', '_blank');
            win.document.body.innerHTML = html;
        }

        function editRoom(index) {
            const room = rooms[index];
            const newNumber = prompt("Số phòng mới:", room.number);
            const newType = prompt("Loại phòng:", room.type);
            if (newNumber) room.number = parseInt(newNumber);
            if (newType) room.type = newType;
            localStorage.setItem('hotelRooms', JSON.stringify(rooms));
            renderFloorPlan();
        }

        function deleteRoom(index) {
            if (confirm("Xóa phòng này?")) {
                rooms.splice(index, 1);
                localStorage.setItem('hotelRooms', JSON.stringify(rooms));
                renderFloorPlan();
            }
        }

        function addNewRoom() {
            const num = prompt("Nhập số phòng mới:");
            const type = prompt("Nhập loại phòng (Standard, Deluxe, VIP...):", "Standard");
            if (num) {
                const floor = Math.floor(parseInt(num)/100);
                rooms.push({
                    id: parseInt(num),
                    number: parseInt(num),
                    type: type,
                    floor: floor,
                    status: "clean",
                    guests: 0,
                    guestName: ""
                });
                localStorage.setItem('hotelRooms', JSON.stringify(rooms));
                renderFloorPlan();
            }
        }

        function exportData() {
            let csv = "Số Phòng,Loại Phòng,Số Khách,Tên Khách,Trạng Thái\n";
            rooms.forEach(r => {
                csv += `${r.number},${r.type},${r.guests},"${r.guestName || ''}",${r.status}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'khach_san_data.csv';
            a.click();
        }

        function clearData() {
            if (confirm("Xóa toàn bộ dữ liệu?")) {
                localStorage.removeItem('hotelRooms');
                location.reload();
            }
        }

        // Khởi chạy
        renderFloorPlan();
    </script>
</body>
</html>
